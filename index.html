<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Un-Minifier Studio</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-html.min.js"></script>
  
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --text: #c9d1d9;
      --accent: #58a6ff;
      --border: #30363d;
      --button-hover: #1f6feb;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 1000px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .editor-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .editor-col {
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--panel);
      padding: 10px 15px;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      font-size: 13px;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      height: 60vh;
      min-height: 400px;
      background: #010409;
      color: #e6edf3;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.5;
      padding: 15px;
      border: 1px solid var(--border);
      border-radius: 0 0 8px 8px;
      resize: vertical;
      box-sizing: border-box;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    button {
      background: var(--accent);
      color: #ffffff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--button-hover);
    }

    .btn-secondary {
      background: #21262d;
      border: 1px solid rgba(240, 246, 252, 0.1);
    }

    .btn-secondary:hover {
      background: #30363d;
    }

    @media (max-width: 768px) {
      .editor-wrapper {
        grid-template-columns: 1fr;
      }
      textarea {
        height: 40vh;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>⚡ Pro Un-Minifier Studio</h1>

    <div class="editor-wrapper">
      <div class="editor-col">
        <div class="toolbar">
          <span>Input (Minified)</span>
          <button onclick="fixMyCode()">Format Code ➔</button>
        </div>
        <textarea id="inputBox" spellcheck="false" placeholder="Paste your minified HTML/JS/CSS here..."></textarea>
      </div>

      <div class="editor-col">
        <div class="toolbar">
          <span>Output (Beautified)</span>
          <button class="btn-secondary" onclick="copyCode()" id="copyBtn">Copy</button>
        </div>
        <textarea id="outputBox" spellcheck="false" readonly placeholder="Your surgically clean code will appear here..."></textarea>
      </div>
    </div>
  </div>

  <script>
    function fixMyCode() {
      const input = document.getElementById('inputBox').value;
      
      if (!input.trim()) {
        alert("Please paste some code first!");
        return;
      }

      // The $1M Configuration Object
      const options = {
        indent_size: 2,                  // Tight, professional 2-space indentation
        indent_char: " ",                // Use spaces, not tabs
        preserve_newlines: false,        // STRIPS all unnecessary blank lines/spacing
        wrap_line_length: 0,             // NEVER arbitrarily break lines based on length
        indent_inner_html: true,         // Indents <head> and <body> contents perfectly
        extra_liners: [],                // Prevents injecting forced blank lines between major tags
        unformatted: [                   // Elements that should NEVER break onto new lines
          'b', 'em', 'i', 'strong', 'span', 'a', 'code', 'pre', 
          'button', 'title', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 
          'sub', 'sup', 'strike', 'label', 'small'
        ],
        content_unformatted: ['pre', 'code', 'textarea'] // Protects exact spacing inside these tags
      };

      // Run the formatting
      const cleanCode = html_beautify(input, options);
      
      document.getElementById('outputBox').value = cleanCode;
    }

    function copyCode() {
      const output = document.getElementById('outputBox');
      const copyBtn = document.getElementById('copyBtn');
      
      if (!output.value) return;
      
      output.select();
      document.execCommand('copy');
      
      // Slick UI feedback
      copyBtn.textContent = "Copied! ✓";
      copyBtn.style.background = "#238636";
      
      setTimeout(() => {
        copyBtn.textContent = "Copy";
        copyBtn.style.background = "";
      }, 2000);
    }
  </script>

</body>
</html>
