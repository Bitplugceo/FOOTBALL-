<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>vSoccer Probability Lab</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --text: #e0e0e0;
            --accent: #d4af37;
            --win: #3a9c35;
            --loss: #c91920;
            --border: #333;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
        }

        .header {
            text-align: center;
            padding: 15px;
            background: linear-gradient(90deg, #b91520 0%, #d91f26 100%);
            margin: -10px -10px 15px -10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .header h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 1px;
            color: white;
            text-transform: uppercase;
        }

        .section {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 12px;
        }

        .section h3 {
            margin: 0 0 12px 0;
            font-size: 14px;
            color: var(--accent);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 10px;
            font-weight: 800;
            margin-bottom: 4px;
            color: #888;
        }

        input {
            background: #252525;
            border: 1px solid var(--border);
            color: white;
            padding: 8px;
            font-size: 14px;
            font-weight: bold;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: black;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: 10px;
            cursor: pointer;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            background: #151515;
            border: 1px dashed var(--accent);
        }

        .dash-val {
            font-size: 18px;
            font-weight: 900;
            color: white;
        }

        .dash-label {
            font-size: 9px;
            color: #888;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 12px;
        }

        th {
            background: #333;
            padding: 8px;
            text-align: left;
            color: var(--accent);
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
        }

        .val-high { color: var(--win); font-weight: 900; }
        .val-med { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>vSoccer Probability Lab ⚡</h1>
    </div>

    <div class="section">
        <h3>Algorithm Input (Core Odds)</h3>
        <div class="grid-inputs">
            <div class="input-group">
                <label>HOME (1)</label>
                <input type="number" id="homeOdds" step="0.01" placeholder="2.21">
            </div>
            <div class="input-group">
                <label>DRAW (X)</label>
                <input type="number" id="drawOdds" step="0.01" placeholder="3.71">
            </div>
            <div class="input-group">
                <label>AWAY (2)</label>
                <input type="number" id="awayOdds" step="0.01" placeholder="3.25">
            </div>
        </div>
        <div class="grid-inputs" style="margin-top: 10px;">
            <div class="input-group">
                <label>OVER 2.5</label>
                <input type="number" id="overOdds" step="0.01" placeholder="2.02">
            </div>
            <div class="input-group">
                <label>UNDER 2.5</label>
                <input type="number" id="underOdds" step="0.01" placeholder="1.84">
            </div>
            <div class="input-group">
                <label>GG (Yes)</label>
                <input type="number" id="ggOdds" step="0.01" placeholder="1.75">
            </div>
        </div>
        <button onclick="runAnalysis()">Analyze RNG Pattern</button>
    </div>

    <div id="resultsArea" style="display: none;">
        <div class="section">
            <h3>Projected Match Script</h3>
            <div class="dashboard">
                <div>
                    <div class="dash-label">Home xG</div>
                    <div class="dash-val" id="hxG">0.00</div>
                </div>
                <div>
                    <div class="dash-label">Total Exp. Goals</div>
                    <div class="dash-val" id="txG" style="color: var(--accent);">0.00</div>
                </div>
                <div>
                    <div class="dash-label">Away xG</div>
                    <div class="dash-val" id="axG">0.00</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Detailed Probability Matrix</h3>
            <table id="matrix">
                <thead>
                    <tr>
                        <th>Market</th>
                        <th>True Prob.</th>
                        <th>Algorithm Edge</th>
                    </tr>
                </thead>
                <tbody id="matrixBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function poisson(k, lambda) {
            return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k);
        }

        function factorial(n) {
            if (n === 0) return 1;
            let res = 1;
            for (let i = 2; i <= n; i++) res *= i;
            return res;
        }

        function solveTotalLambda(pUnder25) {
            let lambda = 2.5; // Start guess
            for (let i = 0; i < 50; i++) {
                let currentP = poisson(0, lambda) + poisson(1, lambda) + poisson(2, lambda);
                if (currentP > pUnder25) lambda += 0.05;
                else lambda -= 0.05;
            }
            return lambda;
        }

        function runAnalysis() {
            const h = parseFloat(document.getElementById('homeOdds').value);
            const d = parseFloat(document.getElementById('drawOdds').value);
            const a = parseFloat(document.getElementById('awayOdds').value);
            const ov = parseFloat(document.getElementById('overOdds').value);
            const un = parseFloat(document.getElementById('underOdds').value);

            if (!h || !ov || !un) return alert("Please fill in core odds.");

            // 1. De-Vig
            const margin1X2 = (1/h) + (1/d) + (1/a);
            const probH = (1/h) / margin1X2;
            const probA = (1/a) / margin1X2;

            const marginOU = (1/ov) + (1/un);
            const trueProbUnder = (1/un) / marginOU;

            // 2. Solve for xG (Lambda)
            const totalLambda = solveTotalLambda(trueProbUnder);
            const hxG = totalLambda * (probH / (probH + probA));
            const axG = totalLambda * (probA / (probH + probA));

            document.getElementById('hxG').innerText = hxG.toFixed(2);
            document.getElementById('axG').innerText = axG.toFixed(2);
            document.getElementById('txG').innerText = totalLambda.toFixed(2);

            // 3. Build Matrix
            const matrixBody = document.getElementById('matrixBody');
            matrixBody.innerHTML = "";

            const p0H = poisson(0, hxG);
            const p0A = poisson(0, axG);
            const probGG = (1 - p0H) * (1 - p0A) * 100;

            const markets = [
                { name: "Over 1.5 Goals", prob: (1 - (poisson(0, totalLambda) + poisson(1, totalLambda))) * 100 },
                { name: "Under 1.5 Goals", prob: (poisson(0, totalLambda) + poisson(1, totalLambda)) * 100 },
                { name: "Over 3.5 Goals", prob: (1 - (poisson(0, totalLambda) + poisson(1, totalLambda) + poisson(2, totalLambda) + poisson(3, totalLambda))) * 100 },
                { name: "Both Teams To Score (GG)", prob: probGG },
                { name: "Double Chance (1X)", prob: (probH + (1/d / margin1X2)) * 100 },
                { name: "Double Chance (X2)", prob: (probA + (1/d / margin1X2)) * 100 }
            ];

            markets.forEach(m => {
                const row = `<tr>
                    <td>${m.name}</td>
                    <td class="${m.prob > 60 ? 'val-high' : 'val-med'}">${m.prob.toFixed(1)}%</td>
                    <td>${(m.prob/10).toFixed(1)} units</td>
                </tr>`;
                matrixBody.innerHTML += row;
            });

            document.getElementById('resultsArea').style.display = "block";
        }
    </script>
</body>
</html>
