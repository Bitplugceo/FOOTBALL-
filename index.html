<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Patcher V13 — Context-Aware Edition</title>
  <style>
    :root {
      --bg:      #0d1117;
      --panel:   #161b22;
      --text:    #c9d1d9;
      --accent:  #238636;
      --border:  #30363d;
      --error:   #f85149;
      --warning: #d29922;
      --blue:    #1f6feb;
      --muted:   #8b949e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px 16px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container { width: 100%; max-width: 840px; }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 22px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Box ── */
    .box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .box.blue  { border-color: rgba(31,111,235,0.45); }
    .box-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .box.blue .box-header { border-bottom-color: rgba(31,111,235,0.2); color: var(--blue); }

    /* ── Textarea ── */
    textarea {
      width: 100%;
      background: #010409;
      color: #e6edf3;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.65;
      padding: 14px;
      border: none;
      resize: vertical;
      outline: none;
    }
    textarea::placeholder { color: #484f58; }

    /* ── Prompt preview ── */
    #promptContent {
      padding: 12px 14px;
      font-family: monospace;
      font-size: 11px;
      color: #8b949e;
      white-space: pre-wrap;
      line-height: 1.55;
      max-height: 220px;
      overflow-y: auto;
    }

    /* ── Buttons ── */
    .icon-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .btn-lg {
      flex: 1;
      padding: 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 22px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: filter .15s, transform .1s;
    }
    .btn-lg:hover  { filter: brightness(1.15); }
    .btn-lg:active { transform: scale(0.97); }
    .btn-run  { background: var(--accent); color: #fff; }
    .btn-dl   { background: var(--blue);   color: #fff; }
    .btn-copy { background: #6e7681;        color: #fff; }

    .util-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .btn-sm {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .15s;
    }
    .btn-sm:hover      { border-color: var(--muted); }
    .btn-sm.danger     { color: var(--error);   border-color: rgba(248,81,73,.3); }
    .btn-sm.blue-btn   { color: var(--blue);    border-color: rgba(31,111,235,.3); font-size: 11px; padding: 4px 10px; }
    .btn-sm.danger:hover { border-color: var(--error); }

    /* ── Status bar ── */
    .status {
      text-align: center;
      font-weight: 600;
      font-size: 13px;
      padding: 11px 14px;
      border-radius: 6px;
      display: none;
      margin-bottom: 14px;
    }
    .st-success { background: rgba(35,134,54,.15);  color: var(--accent);  border: 1px solid rgba(35,134,54,.4); }
    .st-warning { background: rgba(210,153,34,.15); color: var(--warning); border: 1px solid rgba(210,153,34,.4); }
    .st-error   { background: rgba(248,81,73,.15);  color: var(--error);   border: 1px solid rgba(248,81,73,.4); }

    /* ── Microscope button ── */
    #scopeBtn {
      position: fixed;
      top: 20px; right: 20px;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--panel);
      border: 1px solid var(--error);
      font-size: 22px;
      cursor: pointer;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3000;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
      transition: filter .15s;
    }
    #scopeBtn:hover { filter: brightness(1.2); }
    .pulse { animation: glow 2s infinite; }
    @keyframes glow {
      0%   { box-shadow: 0 0 0   0 rgba(248,81,73,.5); }
      60%  { box-shadow: 0 0 0 10px rgba(248,81,73,0);  }
      100% { box-shadow: 0 0 0   0 rgba(248,81,73,0);  }
    }

    /* ── Debug overlay ── */
    #debugOverlay {
      position: fixed;
      inset: 0;
      background: rgba(13,17,23,.97);
      backdrop-filter: blur(6px);
      z-index: 2000;
      display: none;
      flex-direction: column;
      padding: 0 0 24px;
      overflow-y: auto;
    }
    .debug-bar {
      position: sticky;
      top: 0;
      background: rgba(13,17,23,.95);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--error);
      z-index: 1;
    }
    .debug-title { color: var(--error); font-size: 15px; font-weight: 700; }
    #diagList { padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Diagnostic items ── */
    .diag-item {
      border-radius: 6px;
      padding: 11px 13px;
      border: 1px solid var(--border);
    }
    .diag-fail { border-left: 3px solid var(--error);   background: rgba(248,81,73,.05); }
    .diag-pass { border-left: 3px solid var(--accent);  background: rgba(35,134,54,.05); }
    .diag-warn { border-left: 3px solid var(--warning); background: rgba(210,153,34,.05); }

    .diag-label {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 7px;
    }
    .diag-fail .diag-label { color: var(--error); }
    .diag-pass .diag-label { color: var(--accent); }
    .diag-warn .diag-label { color: var(--warning); }

    .diag-item pre {
      background: #010409;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 9px;
      font-size: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
      margin: 0;
      color: #ff7b72;
    }
    .diag-pass pre { color: #7ee787; }
    .diag-warn pre { color: #e3b341; }

    /* ── Stats row ── */
    .stats-row {
      display: flex;
      gap: 14px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .stat-chip {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid;
    }
    .sc-green  { color: var(--accent);  border-color: rgba(35,134,54,.4);  background: rgba(35,134,54,.1); }
    .sc-blue   { color: var(--blue);    border-color: rgba(31,111,235,.4); background: rgba(31,111,235,.1); }
    .sc-red    { color: var(--error);   border-color: rgba(248,81,73,.4);  background: rgba(248,81,73,.1); }
  </style>
</head>
<body>

<!-- Floating scope button -->
<button id="scopeBtn" onclick="toggleDebug()" aria-label="Open diagnostic log">🔬</button>

<!-- Debug overlay -->
<div id="debugOverlay" role="dialog" aria-modal="true" aria-labelledby="dbTitle">
  <div class="debug-bar">
    <button class="btn-sm" style="padding:5px 12px" onclick="copyDebugLog()">📋 Copy Log</button>
    <span id="dbTitle" class="debug-title">🔬 Diagnostic Log</span>
    <button class="btn-sm" style="margin-left:auto" onclick="toggleDebug()">✕ Close</button>
  </div>
  <div id="diagList"></div>
</div>

<!-- Main UI -->
<div class="container">
  <div class="header">
    <h1>🛠️ Auto-Patcher <span style="color:var(--blue)">V13</span></h1>
    <p>Context-Aware · Line-Based Matching · Whitespace-Tolerant · Duplicate-Safe</p>
  </div>

  <!-- AI Prompt Helper -->
  <div class="box blue">
    <div class="box-header">
      <span>🤖 COPY THIS PROMPT BEFORE ASKING YOUR AI FOR PATCHES</span>
      <button class="btn-sm blue-btn" onclick="copyPrompt()">📋 Copy Prompt</button>
    </div>
    <div id="promptContent"></div>
  </div>

  <!-- Master Code -->
  <div class="box">
    <div class="box-header">
      <label for="masterCode">1 · MASTER CODE</label>
      <input type="file" id="fileUploader" style="font-size:11px;max-width:200px" aria-label="Upload master code file">
    </div>
    <textarea id="masterCode" style="height:260px" spellcheck="false"
      placeholder="Paste or upload your master code here..."></textarea>
  </div>

  <!-- Patch Block -->
  <div class="box">
    <div class="box-header">
      <label for="patchCode">2 · PATCH INSTRUCTIONS (from AI)</label>
    </div>
    <textarea id="patchCode" style="height:200px" spellcheck="false"
      placeholder="Paste AI patch output here...&#10;&#10;Expected format:&#10;---FIND---&#10;[code to locate]&#10;---REPLACE---&#10;[replacement code]&#10;---END---"></textarea>
  </div>

  <!-- Action buttons -->
  <div class="icon-row">
    <button class="btn-lg btn-run"  onclick="applyPatches()" title="Apply Patches" aria-label="Apply patches">⚙️</button>
    <button class="btn-lg btn-dl"   onclick="downloadFile()" title="Download File"  aria-label="Download file">📥</button>
    <button class="btn-lg btn-copy" onclick="copyMaster()"   title="Copy Code"      aria-label="Copy code">📋</button>
  </div>

  <div class="util-row">
    <button class="btn-sm"        onclick="clearPatches()">🧹 Clear Patches</button>
    <button class="btn-sm danger" onclick="hardReset()">🚨 Hard Reset</button>
  </div>

  <div id="statusMsg" class="status" role="status" aria-live="polite"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  PROMPT TEMPLATE
// ═══════════════════════════════════════════════════════════════
const PROMPT = `I am using a custom Auto-Patcher (V13). You must format your modifications with extreme precision to ensure they match safely.

MANDATORY RULES:

1. BRUTAL SURROUNDING CONTEXT:
   Your ---FIND--- block must lock the target code inside a strict "context prison". 
   - You MUST include at least 4 to 6 lines of exact, literal code directly preceding the target change.
   - You MUST include at least 4 to 6 lines of exact, literal code directly following the target change.
   Never target a raw, standalone line that appears elsewhere in the file. Use this surrounding context to pinpoint exactly ONE unique spot.

2. NO PLACEHOLDERS, ELLIPSES, OR TRUNCATIONS:
   The code inside ---FIND--- and ---REPLACE--- must be complete and exact. Never use "..." or skip any lines within the context blocks.

3. SINGLE MARKDOWN BLOCK:
   Place all sequential patches inside ONE continuous \`\`\`markdown block. Do not include conversational remarks, comments, or explanations inside this block.

4. 100% MIRRORED REPLACE BLOCK (CRITICAL):
   The preceding and succeeding context lines inside your ---REPLACE--- block MUST be 100% identical, line-for-line, to the context lines inside your ---FIND--- block. 
   
   If you omit or truncate these context lines from the ---REPLACE--- block, the patcher will permanently delete them from my code. You must mirror them exactly.

   Structure your blocks precisely like this:

   ---FIND---
   [4-6 lines of exact preceding context]
   [original code line(s) to be replaced]
   [4-6 lines of exact succeeding context]
   ---REPLACE---
   [4-6 lines of exact preceding context (identical to above)]
   [modified code line(s)]
   [4-6 lines of exact succeeding context (identical to above)]
   ---END---`;

document.getElementById('promptContent').textContent = PROMPT;

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let currentFileName = 'patched_master.txt';
let isDebugOpen     = false;
let diagItems       = [];
let stats           = { applied: 0, verified: 0, failed: 0 };
let statusTimer     = null;

// ═══════════════════════════════════════════════════════════════
//  CLIPBOARD
// ═══════════════════════════════════════════════════════════════
async function copyToClipboard(text) {
  if (navigator.clipboard?.writeText) {
    try { await navigator.clipboard.writeText(text); return true; } catch {}
  }
  const ta = document.createElement('textarea');
  Object.assign(ta.style, { position:'fixed', top:'0', left:'0', opacity:'0', pointerEvents:'none' });
  ta.value = text;
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { return document.execCommand('copy'); }
  catch { return false; }
  finally { document.body.removeChild(ta); }
}

async function copyPrompt() {
  try {
    const ok = await copyToClipboard(PROMPT);
    showStatus(ok ? '📋 Prompt copied to clipboard!' : '❌ Copy failed — select manually.', ok ? 'success' : 'error', true);
  } catch (err) {
    showStatus('❌ Copy process error: ' + err.message, 'error', false);
  }
}

// ═══════════════════════════════════════════════════════════════
//  FILE UPLOAD
// ═══════════════════════════════════════════════════════════════
document.getElementById('fileUploader').addEventListener('change', function (e) {
  try {
    const file = e.target.files[0];
    if (!file) return;
    currentFileName = file.name;
    const r = new FileReader();
    r.onerror = () => showStatus('❌ Failed to read file.', 'error', false);
    r.onload  = ev => {
      document.getElementById('masterCode').value = ev.target.result;
      showStatus(`✅ "${file.name}" loaded.`, 'success', true);
    };
    r.readAsText(file);
    e.target.value = '';
  } catch (err) {
    showStatus('❌ File loading error: ' + err.message, 'error', false);
  }
});

// ═══════════════════════════════════════════════════════════════
//  PATCH PARSER
// ═══════════════════════════════════════════════════════════════
function parsePatches(raw) {
  const patches = [];
  let cur = null, inFind = false, inReplace = false;

  for (const line of raw.split('\n')) {
    const t = line.trim().toUpperCase();

    if (t === '---FIND---') {
      if (cur?.findLines.length) patches.push(cur);
      cur = { findLines: [], replaceLines: [] };
      inFind = true; inReplace = false;

    } else if (t === '---REPLACE---' && cur && inFind) {
      inFind = false; inReplace = true;

    } else if (t === '---END---') {
      if (cur?.findLines.length) patches.push(cur);
      cur = null; inFind = false; inReplace = false;

    } else if (inFind && cur)    { cur.findLines.push(line);
    } else if (inReplace && cur) { cur.replaceLines.push(line); }
  }

  if (cur?.findLines.length) patches.push(cur);
  return patches;
}

// ═══════════════════════════════════════════════════════════════
//  LINE-BASED MATCHING ENGINE
// ═══════════════════════════════════════════════════════════════

/** Remove leading and trailing blank-only lines from a line array. */
function stripBlanks(lines) {
  let s = 0, e = lines.length - 1;
  while (s <= e && lines[s].trim() === '') s++;
  while (e >= s && lines[e].trim() === '') e--;
  return s > e ? [] : lines.slice(s, e + 1);
}

/** Normalise a single line for comparison. */
function norm(line, mode) {
  if (!line) return '';
  const t = line.trim();
  return mode === 'fuzzy' ? t.replace(/\s+/g, ' ') : t;
}

/** Slide needleLines across masterLines and collect all matching windows. */
function findWindows(masterLines, needleLines, mode) {
  if (!needleLines.length) return [];
  const matches = [];
  const limit   = masterLines.length - needleLines.length;

  for (let i = 0; i <= limit; i++) {
    if (needleLines.every((nl, j) => norm(masterLines[i + j], mode) === norm(nl, mode))) {
      matches.push({ start: i, count: needleLines.length });
    }
  }
  return matches;
}

/** Heuristic check to see if replacement is already in place. */
function looksAlreadyApplied(masterLines, replaceLines) {
  const eff = stripBlanks(replaceLines);
  if (!eff.length) return false;

  const anchors = [
    eff[0],
    eff[Math.floor(eff.length / 2)],
    eff[eff.length - 1]
  ].map(l => norm(l, 'fuzzy')).filter(s => s.length > 8);

  if (!anchors.length) return false;
  return anchors.every(a => masterLines.some(l => norm(l, 'fuzzy') === a));
}

// ═══════════════════════════════════════════════════════════════
//  CORE ENGINE
// ═══════════════════════════════════════════════════════════════
function applyPatches() {
  try {
    const masterEl = document.getElementById('masterCode');
    const patchEl  = document.getElementById('patchCode');
    const scopeBtn = document.getElementById('scopeBtn');

    if (isDebugOpen) toggleDebug();
    scopeBtn.style.display = 'none';
    scopeBtn.classList.remove('pulse');

    if (!masterEl.value.trim() || !patchEl.value.trim()) {
      showStatus('⚠️ Master code or patch instructions are empty.', 'warning', false);
      return;
    }

    const masterText = masterEl.value.replace(/\r\n/g, '\n');
    const rawPatches = patchEl.value.replace(/\r\n/g, '\n');
    const parsed     = parsePatches(rawPatches);

    if (!parsed.length) {
      showStatus('⚠️ No ---FIND--- markers found in patch instructions.', 'warning', false);
      return;
    }

    stats     = { applied: 0, verified: 0, failed: 0 };
    diagItems = [];

    let masterLines = masterText.split('\n');

    parsed.forEach((patch, idx) => {
      const num         = idx + 1;
      const rawFindText = patch.findLines.join('\n');
      const needle      = stripBlanks(patch.findLines);
      const replacement = stripBlanks(patch.replaceLines);
      const isDeletion  = replacement.length === 0;

      // ── Guard: empty FIND ──────────────────────────────────────
      if (!needle.length) {
        stats.failed++;
        diagItems.push({
          type: 'fail', num, tier: '!',
          text: rawFindText,
          reason: 'Empty ---FIND--- block — nothing to search for.'
        });
        return;
      }

      // ── TIER 1: Trim per-line comparison ───────────────────────
      let windows = findWindows(masterLines, needle, 'trim');

      if (windows.length === 1) {
        const { start, count } = windows[0];
        masterLines.splice(start, count, ...replacement);
        stats.applied++;
        return;
      }

      if (windows.length > 1) {
        stats.failed++;
        diagItems.push({
          type: 'fail', num, tier: 'T1',
          text: rawFindText,
          reason: `DUPLICATE LOCK — found ${windows.length} identical locations.\n` +
                  `The targeted change is ambiguous inside the file.\n` +
                  `Ensure your prompt forces the AI to output unique context lines before and after edits.`
        });
        return;
      }

      // ── TIER 2: Fuzzy per-line comparison ──────────────────────
      windows = findWindows(masterLines, needle, 'fuzzy');

      if (windows.length === 1) {
        const { start, count } = windows[0];
        masterLines.splice(start, count, ...replacement);
        stats.applied++;
        return;
      }

      if (windows.length > 1) {
        stats.failed++;
        diagItems.push({
          type: 'fail', num, tier: 'T2',
          text: rawFindText,
          reason: `DUPLICATE LOCK (fuzzy) — found ${windows.length} similar locations after whitespace normalisation.`
        });
        return;
      }

      // ── TIER 3: Idempotency check ───────────────────────────────
      if (!isDeletion && looksAlreadyApplied(masterLines, patch.replaceLines)) {
        stats.verified++;
        diagItems.push({
          type: 'pass', num, tier: 'V',
          text: rawFindText,
          reason: 'Already applied — replacement content detected in master. Patch skipped.'
        });
        return;
      }

      // ── TIER 4: Deletion patch — block already gone ─────────────
      if (isDeletion) {
        stats.verified++;
        diagItems.push({
          type: 'pass', num, tier: 'V',
          text: rawFindText,
          reason: 'Deletion patch: target block not found in master — may have already been deleted. Skipped.'
        });
        return;
      }

      // ── TIER 5: True failure ─────────────────────────────────────
      stats.failed++;
      diagItems.push({
        type: 'fail', num, tier: 'T5',
        text: rawFindText,
        reason: 'Block not found (exact or fuzzy). Ensure the FIND block exactly matches the master file structure.'
      });
    });

    masterEl.value = masterLines.join('\n');
    renderDiagnostics(scopeBtn);
  } catch (err) {
    console.error(err);
    showStatus('❌ Engine execution halted: ' + err.message, 'error', false);
  }
}

// ═══════════════════════════════════════════════════════════════
//  RENDER DIAGNOSTICS
// ═══════════════════════════════════════════════════════════════
function renderDiagnostics(scopeBtn) {
  const list = document.getElementById('diagList');
  list.innerHTML = '';

  const statsRow = document.createElement('div');
  statsRow.className = 'stats-row';
  statsRow.innerHTML =
    `<span class="stat-chip sc-green">✅ Applied: ${stats.applied}</span>` +
    (stats.verified ? `<span class="stat-chip sc-blue">ℹ️ Already Present: ${stats.verified}</span>` : '') +
    (stats.failed   ? `<span class="stat-chip sc-red">❌ Failed: ${stats.failed}</span>` : '');
  list.appendChild(statsRow);

  diagItems.forEach(item => {
    const wrap  = document.createElement('div');
    const cls   = item.type === 'fail' ? 'diag-fail' :
                  item.type === 'pass' ? 'diag-pass' : 'diag-warn';
    wrap.className = `diag-item ${cls}`;

    const label = document.createElement('div');
    label.className = 'diag-label';
    label.textContent = `[Patch #${item.num}] [${item.tier}] ${item.reason}`;

    const pre = document.createElement('pre');
    pre.textContent = item.text || '(empty)';

    wrap.appendChild(label);
    wrap.appendChild(pre);
    list.appendChild(wrap);
  });

  if (stats.failed > 0) {
    scopeBtn.style.display = 'flex';
    scopeBtn.classList.add('pulse');
    let msg = `⚠️ Applied: ${stats.applied}`;
    if (stats.verified) msg += `  ·  Already present: ${stats.verified}`;
    msg += `  ·  Failed: ${stats.failed}  — tap 🔬 for details`;
    showStatus(msg, 'warning', false);
  } else if (stats.applied === 0 && stats.verified > 0) {
    showStatus(`✅ All ${stats.verified} patches were already applied.`, 'success', true);
  } else {
    let msg = `✅ ${stats.applied} patch${stats.applied !== 1 ? 'es' : ''} applied`;
    if (stats.verified) msg += `  ·  ${stats.verified} already present`;
    showStatus(msg, 'success', true);
  }
}

// ═══════════════════════════════════════════════════════════════
//  DEBUG OVERLAY
// ═══════════════════════════════════════════════════════════════
function toggleDebug() {
  const overlay  = document.getElementById('debugOverlay');
  const scopeBtn = document.getElementById('scopeBtn');
  isDebugOpen    = !isDebugOpen;
  overlay.style.display = isDebugOpen ? 'flex' : 'none';

  if (!isDebugOpen && stats.failed > 0) scopeBtn.classList.add('pulse');
  else scopeBtn.classList.remove('pulse');
}

async function copyDebugLog() {
  try {
    const hdr  = `DIAGNOSTIC SUMMARY\nApplied: ${stats.applied} | Verified: ${stats.verified} | Failed: ${stats.failed}\n\n`;
    const body = diagItems.map(d =>
      `[Patch #${d.num}] [${d.tier}]\nReason: ${d.reason}\n--- FIND ---\n${d.text}`
    ).join('\n\n─────────────────────────────────\n\n');
    const ok = await copyToClipboard(hdr + body);
    alert(ok ? 'Diagnostic log copied to clipboard.' : 'Copy failed — select text manually.');
  } catch (err) {
    alert('Failed to construct log: ' + err.message);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && isDebugOpen) toggleDebug();
});

// ═══════════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════════
function clearPatches() {
  document.getElementById('patchCode').value = '';
}

function hardReset() {
  try {
    if (!confirm('Clear all fields and reset the patcher?')) return;
    document.getElementById('masterCode').value = '';
    document.getElementById('patchCode').value  = '';
    document.getElementById('fileUploader').value = '';
    currentFileName = 'patched_master.txt';
    stats     = { applied: 0, verified: 0, failed: 0 };
    diagItems = [];
    const scopeBtn = document.getElementById('scopeBtn');
    scopeBtn.style.display = 'none';
    scopeBtn.classList.remove('pulse');
    if (isDebugOpen) toggleDebug();
    showStatus('🚨 Reset complete.', 'error', true);
  } catch (err) {
    console.error(err);
    showStatus('❌ Reset action failed: ' + err.message, 'error', false);
  }
}

async function copyMaster() {
  try {
    const ok = await copyToClipboard(document.getElementById('masterCode').value);
    showStatus(ok ? '📋 Code copied to clipboard!' : '❌ Copy failed.', ok ? 'success' : 'error', true);
  } catch (err) {
    showStatus('❌ Clipboard error: ' + err.message, 'error', false);
  }
}

function downloadFile() {
  try {
    const code = document.getElementById('masterCode').value;
    const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), { href: url, download: currentFileName });
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (err) {
    showStatus('❌ File generation failed: ' + err.message, 'error', false);
  }
}

function showStatus(msg, type, autoHide) {
  if (statusTimer) { clearTimeout(statusTimer); statusTimer = null; }
  const el = document.getElementById('statusMsg');
  if (!el) return;
  el.className     = `status st-${type}`;
  el.style.display = 'block';
  el.textContent   = msg;
  if (autoHide) statusTimer = setTimeout(() => { el.style.display = 'none'; }, 3200);
}
</script>
