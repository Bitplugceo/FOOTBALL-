<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NBL1 2026 Box Score Scraper</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: system-ui, -apple-system, sans-serif;
         background:#0b0b0b; color:#eee; margin:0; padding:16px; }
  h1 { font-size:20px; margin:0 0 12px; }
  .row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  button { background:#1a7f3a; color:#fff; border:0; padding:10px 14px;
           border-radius:8px; font-weight:600; cursor:pointer; }
  button.alt { background:#333; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  select, input { background:#111; color:#eee; border:1px solid #333;
                  padding:8px; border-radius:6px; }
  #log { background:#000; border:1px solid #222; padding:10px;
         height:200px; overflow:auto; font-family:ui-monospace,monospace;
         font-size:12px; white-space:pre-wrap; border-radius:6px; }
  #progress { height:6px; background:#222; border-radius:3px; overflow:hidden;
              margin:8px 0; }
  #bar { height:100%; width:0%; background:#1a7f3a; transition:width .2s; }
  table { width:100%; border-collapse:collapse; font-size:12px;
          margin-top:12px; }
  th, td { border:1px solid #222; padding:4px 6px; text-align:left; }
  th { background:#151515; position:sticky; top:0; }
  .stat { display:inline-block; margin-right:12px; }
  .stat b { color:#7fdc9c; }
  details { background:#111; border:1px solid #222; border-radius:6px;
            padding:8px; margin-top:10px; }
</style>
</head>
<body>

<h1>NBL1 2026 — Box Score Scraper</h1>

<div class="row">
  <label>Conference:
    <select id="conf">
      <option value="all">All</option>
      <option value="north">North</option>
      <option value="east">East</option>
      <option value="south">South</option>
      <option value="west">West</option>
      <option value="central">Central</option>
    </select>
  </label>
  <label>Proxy:
    <select id="proxy">
      <option value="https://corsproxy.io/?">corsproxy.io</option>
      <option value="https://api.allorigins.win/raw?url=">allorigins.win</option>
      <option value="https://cors.eu.org/">cors.eu.org</option>
    </select>
  </label>
</div>

<div class="row">
  <button id="run">▶ Start Scrape</button>
  <button id="stop" class="alt" disabled>■ Stop</button>
  <button id="dlJson" class="alt" disabled>⬇ JSON</button>
  <button id="dlCsv" class="alt" disabled>⬇ CSV</button>
  <button id="save" class="alt">💾 Save to Browser</button>
  <button id="load" class="alt">📂 Load Saved</button>
</div>

<div id="progress"><div id="bar"></div></div>
<div id="stats"></div>
<div id="log"></div>

<details><summary>Preview (first 200 rows)</summary>
  <div id="preview"></div>
</details>

<script>
const BASE = "https://nbl1.com.au";
const CONFS = ["north","east","south","west","central"];
const SEASON = 2026;

const $ = id => document.getElementById(id);
const logEl = $("log");
const log = m => { logEl.textContent += m + "\n"; logEl.scrollTop = logEl.scrollHeight; };
let stopFlag = false;
let dataset = { season: SEASON, generated_at: null, summary: {}, rows: [] };

const sleep = ms => new Promise(r => setTimeout(r, ms));
const proxy = url => $("proxy").value + encodeURIComponent(url);

async function fetchHTML(url) {
  const r = await fetch(proxy(url));
  if (!r.ok) throw new Error("HTTP " + r.status);
  return await r.text();
}

function parseGameIds(html) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  const ids = new Set();
  doc.querySelectorAll("a[href*='/games/']").forEach(a => {
    const m = a.getAttribute("href").match(/\/games\/([^/?#]+)/);
    if (m) ids.add(m[1]);
  });
  return [...ids];
}

function parseBox(html, gid, conf) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  const rows = [];
  doc.querySelectorAll("table").forEach(tbl => {
    const headers = [...tbl.querySelectorAll("thead th, tr th")]
      .map(h => h.textContent.trim());
    tbl.querySelectorAll("tr").forEach(tr => {
      const cells = [...tr.querySelectorAll("td")].map(td => td.textContent.trim());
      if (cells.length) rows.push({ game_id: gid, conference: conf, cells, headers });
    });
  });
  // Also try to grab final score / teams from headings
  const title = doc.querySelector("title")?.textContent?.trim() || "";
  return { meta: { title }, rows };
}

function toCSV(rows) {
  const max = Math.max(...rows.map(r => r.cells.length), 0);
  const head = ["game_id","conference", ...Array.from({length:max}, (_,i)=>"c"+i)];
  const lines = [head.join(",")];
  rows.forEach(r => {
    const vals = [r.game_id, r.conference, ...r.cells];
    lines.push(vals.map(v => `"${(v??"").replace(/"/g,'""')}"`).join(","));
  });
  return lines.join("\n");
}

function download(name, content, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function renderPreview() {
  const rows = dataset.rows.slice(0, 200);
  const max = Math.max(...rows.map(r => r.cells.length), 0);
  let h = "<table><thead><tr><th>game</th><th>conf</th>";
  for (let i=0;i<max;i++) h += `<th>c${i}</th>`;
  h += "</tr></thead><tbody>";
  rows.forEach(r => {
    h += `<tr><td>${r.game_id}</td><td>${r.conference}</td>`;
    for (let i=0;i<max;i++) h += `<td>${r.cells[i]||""}</td>`;
    h += "</tr>";
  });
  h += "</tbody></table>";
  $("preview").innerHTML = h;
}

function renderStats() {
  const s = dataset.summary;
  $("stats").innerHTML =
    `<span class="stat">Rows: <b>${dataset.rows.length}</b></span>` +
    Object.entries(s).map(([k,v]) =>
      `<span class="stat">${k}: <b>${v}</b> games</span>`).join("");
}

$("run").onclick = async () => {
  stopFlag = false;
  dataset = { season: SEASON, generated_at: new Date().toISOString(),
              summary: {}, rows: [] };
  $("run").disabled = true; $("stop").disabled = false;
  $("dlJson").disabled = true; $("dlCsv").disabled = true;
  logEl.textContent = "";
  const choice = $("conf").value;
  const confs = choice === "all" ? CONFS : [choice];

  // 1) Collect game IDs
  const allIds = [];
  for (const c of confs) {
    if (stopFlag) break;
    log(`Fetching fixtures: ${c}`);
    try {
      const html = await fetchHTML(`${BASE}/games?conference=${c}&season=${SEASON}`);
      const ids = parseGameIds(html);
      dataset.summary[c] = ids.length;
      ids.forEach(id => allIds.push({ id, conf: c }));
      log(`  ${c}: ${ids.length} games`);
    } catch(e) { log(`  ERR ${c}: ${e.message}`); }
    await sleep(400);
  }
  renderStats();

  // 2) Loop through games
  let done = 0;
  for (const { id, conf } of allIds) {
    if (stopFlag) { log("Stopped."); break; }
    try {
      const html = await fetchHTML(`${BASE}/games/${id}`);
      const { rows } = parseBox(html, id, conf);
      dataset.rows.push(...rows);
    } catch(e) { log(`ERR ${id}: ${e.message}`); }
    done++;
    $("bar").style.width = (done/allIds.length*100).toFixed(1) + "%";
    if (done % 5 === 0) { renderStats(); renderPreview(); }
    await sleep(500);
  }

  renderStats(); renderPreview();
  log(`Done. ${dataset.rows.length} rows collected.`);
  $("run").disabled = false; $("stop").disabled = true;
  $("dlJson").disabled = false; $("dlCsv").disabled = false;
};

$("stop").onclick = () => { stopFlag = true; };

$("dlJson").onclick = () =>
  download("nbl1_2026_boxscores.json", JSON.stringify(dataset, null, 2), "application/json");

$("dlCsv").onclick = () =>
  download("nbl1_2026_boxscores.csv", toCSV(dataset.rows), "text/csv");

$("save").onclick = () => {
  localStorage.setItem("nbl1_2026", JSON.stringify(dataset));
  log("Saved to browser localStorage.");
};

$("load").onclick = () => {
  const raw = localStorage.getItem("nbl1_2026");
  if (!raw) return log("Nothing saved.");
  dataset = JSON.parse(raw);
  renderStats(); renderPreview();
  $("dlJson").disabled = false; $("dlCsv").disabled = false;
  log("Loaded from localStorage.");
};
</script>

</body>
</html>
