<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto‑Patcher V13 – Context‑Aware</title>
  <style>
    :root {
      --bg: #0d1117; --panel: #161b22; --text: #c9d1d9;
      --accent: #238636; --border: #30363d; --error: #f85149;
      --warning: #d29922; --blue: #1f6feb;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text); margin: 0; padding: 20px;
      display: flex; flex-direction: column; align-items: center;
    }
    .container { width: 100%; max-width: 900px; }
    .box {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; margin-bottom: 15px; overflow: hidden;
    }
    .box-header {
      padding: 10px 15px; border-bottom: 1px solid var(--border);
      font-size: 13px; font-weight: bold; color: #8b949e;
      display: flex; justify-content: space-between; align-items: center;
    }
    textarea {
      width: 100%; background: #010409; color: #e6edf3;
      font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
      font-size: 14px; padding: 15px; border: none; box-sizing: border-box;
      resize: vertical; outline: none; line-height: 1.6;
      tab-size: 2;
    }
    textarea:focus { background: #0a0e14; }
    .btn-row {
      display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0;
    }
    .btn {
      padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer;
      font-weight: bold; font-size: 14px; background: var(--panel);
      color: var(--text); border: 1px solid var(--border);
      transition: 0.2s;
    }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-blue    { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-danger  { color: var(--error); border-color: rgba(248,81,73,0.4); }
    .btn:hover { opacity: 0.8; transform: scale(0.98); }
    .status {
      padding: 12px; border-radius: 6px; display: none;
      font-weight: bold; margin: 10px 0;
    }
    .status-success { background: rgba(35,134,54,0.2); color: var(--accent); border: 1px solid var(--accent); }
    .status-warning { background: rgba(210,153,34,0.2); color: var(--warning); border: 1px solid var(--warning); }
    .status-error   { background: rgba(248,81,73,0.2); color: var(--error); border: 1px solid var(--error); }
    .failed-item {
      background: #161b22; border-left: 3px solid var(--error);
      padding: 10px; margin: 8px 0; border-radius: 4px;
    }
    .failed-item pre {
      background: #010409; padding: 8px; border-radius: 4px;
      white-space: pre-wrap; overflow-x: auto; margin: 5px 0 0;
      font-size: 12px; color: #ff7b72;
    }
    .verified-banner {
      background: rgba(35,134,54,0.1); border: 1px solid var(--accent);
      padding: 10px; border-radius: 4px; color: var(--accent);
      font-size: 13px; margin-bottom: 10px;
    }
    #debugOverlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(13,17,23,0.98); backdrop-filter: blur(4px);
      z-index: 1000; display: none; flex-direction: column;
      padding: 30px 20px; overflow-y: auto;
    }
    .debug-header {
      display: flex; align-items: center; gap: 15px;
      border-bottom: 1px solid var(--error); padding-bottom: 10px;
      flex-wrap: wrap;
    }
    #microscopeBtn {
      position: fixed; top: 20px; right: 20px;
      background: var(--panel); border: 1px solid var(--error);
      border-radius: 50%; width: 45px; height: 45px;
      display: none; justify-content: center; align-items: center;
      font-size: 20px; cursor: pointer; z-index: 1100;
      box-shadow: 0 0 15px rgba(248,81,73,0.3);
    }
    .pulse { animation: pulseError 2s infinite; }
    @keyframes pulseError {
      0% { box-shadow: 0 0 0 0 rgba(248,81,73,0.5); }
      70% { box-shadow: 0 0 0 12px rgba(248,81,73,0); }
      100% { box-shadow: 0 0 0 0 rgba(248,81,73,0); }
    }
    .util-row { display: flex; gap: 8px; flex-wrap: wrap; }
    @media (max-width: 600px) {
      .btn-row, .util-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<button id="microscopeBtn" onclick="toggleDebug()" title="Diagnostic Log">🔬</button>

<div id="debugOverlay">
  <div class="debug-header">
    <span style="color:var(--error); font-weight:bold;">🔬 Diagnostic Log</span>
    <button class="btn" onclick="copyDebugLog()">📋 Copy Log</button>
    <button class="btn" onclick="toggleDebug()" style="margin-left:auto;">Close</button>
  </div>
  <div id="failedList"></div>
</div>

<div class="container">
  <h1 style="text-align:center;">🛠️ Auto‑Patcher V13</h1>
  <p style="text-align:center; color:#8b949e; font-size:14px;">
    Context‑Aware · Whitespace‑Tolerant · Idempotent
  </p>

  <div class="box">
    <div class="box-header">
      <label for="masterCode">📄 Master Code</label>
      <input type="file" id="fileUploader" style="font-size:11px; max-width:180px;" />
    </div>
    <textarea id="masterCode" style="height:300px;" spellcheck="false"></textarea>
  </div>

  <div class="box">
    <div class="box-header">
      <label for="patchCode">🧩 Patches (with optional <code>---CONTEXT---</code>)</label>
    </div>
    <textarea id="patchCode" style="height:250px;" spellcheck="false"
      placeholder="---FIND---\n...\n---REPLACE---\n...\n---END---\n\n(You can also include ---CONTEXT--- before ---FIND---)"></textarea>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="applyPatches()">⚙️ Apply Patches</button>
    <button class="btn btn-blue" onclick="downloadFile()">📥 Download</button>
    <button class="btn" onclick="copyMaster()">📋 Copy Code</button>
    <button class="btn btn-danger" onclick="hardReset()">🚨 Reset</button>
  </div>
  <div class="util-row">
    <button class="btn" onclick="clearPatches()">🧹 Clear Patches</button>
  </div>

  <div id="statusMsg" class="status"></div>
</div>

<script>
// ============================================================
//  AUTO-PATCHER ENGINE  –  Context-Aware, Idempotent, Fuzzy
// ============================================================

// ----- global state -----
let currentFileName = "patched_master.txt";
let isDebugOpen = false;
let globalFailed = [];
let stats = { applied: 0, skipped: 0, failed: 0 };

// ----- helpers -----
const escapeRegExp = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

function countOccurrences(haystack, needle) {
  if (!needle) return 0;
  return haystack.split(needle).length - 1;
}

function normalizeWhitespace(str) {
  return str.replace(/\s+/g, ' ').trim();
}

function showStatus(msg, type, autoHide = true) {
  const el = document.getElementById('statusMsg');
  el.className = 'status status-' + type;
  el.textContent = msg;
  el.style.display = 'block';
  if (autoHide) {
    setTimeout(() => { el.style.display = 'none'; }, 4000);
  }
}

// ----- file upload -----
document.getElementById('fileUploader').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  currentFileName = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('masterCode').value = ev.target.result;
    showStatus('✅ File loaded: ' + file.name, 'success');
  };
  reader.onerror = () => showStatus('❌ Failed to read file.', 'error');
  reader.readAsText(file);
  e.target.value = '';
});

// ----- parse patches (supports ---CONTEXT---) -----
function parsePatches(raw) {
  const lines = raw.split(/\r?\n/);
  const patches = [];
  let current = null;
  let inFind = false, inReplace = false, inContext = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim().toUpperCase();

    if (trimmed === '---CONTEXT---') {
      if (current) {
        // if we were already building a patch, finalize it
        if (current.findLines.length > 0) patches.push(current);
        current = null;
      }
      current = { findLines: [], replaceLines: [], contextLines: [] };
      inContext = true;
      inFind = false;
      inReplace = false;
      continue;
    }

    if (trimmed === '---FIND---') {
      if (current && current.findLines.length > 0) {
        patches.push(current);
      }
      current = current || { findLines: [], replaceLines: [], contextLines: [] };
      inFind = true;
      inReplace = false;
      inContext = false;
      continue;
    }

    if (trimmed === '---REPLACE---') {
      if (current && inFind) {
        inFind = false;
        inReplace = true;
      }
      continue;
    }

    if (trimmed === '---END---') {
      if (current) {
        if (current.findLines.length > 0) {
          patches.push(current);
        }
        current = null;
      }
      inFind = inReplace = inContext = false;
      continue;
    }

    // Collect lines based on current section
    if (current) {
      if (inContext) {
        current.contextLines.push(line);
      } else if (inFind) {
        current.findLines.push(line);
      } else if (inReplace) {
        current.replaceLines.push(line);
      }
    }
  }

  // last patch if any
  if (current && current.findLines.length > 0) {
    patches.push(current);
  }

  return patches;
}

// ----- core matching: find best occurrence of findText in master -----
function findBestMatch(master, findText, contextText = null) {
  // Normalize line endings
  master = master.replace(/\r\n/g, '\n');
  const findNorm = findText.replace(/\r\n/g, '\n');

  // If context is provided, search only inside that context
  let searchArea = master;
  if (contextText) {
    const ctxNorm = contextText.replace(/\r\n/g, '\n');
    // Try to locate the context in master; if not found, fallback to full master
    const ctxIndex = master.indexOf(ctxNorm);
    if (ctxIndex !== -1) {
      searchArea = master.substring(ctxIndex, ctxIndex + ctxNorm.length);
    } else {
      // fuzzy context search? we'll just use full master
      console.warn('Context block not found exactly, falling back to full search.');
    }
  }

  // 1. Exact match
  let occurrences = countOccurrences(searchArea, findNorm);
  if (occurrences === 1) {
    return { match: findNorm, index: searchArea.indexOf(findNorm), type: 'exact', area: searchArea };
  }

  // 2. Whitespace‑insensitive fuzzy match (collapse all whitespace)
  const fuzzyFind = normalizeWhitespace(findNorm);
  const fuzzySearch = normalizeWhitespace(searchArea);
  let fuzzyMatches = [];
  let start = 0;
  while (true) {
    const idx = fuzzySearch.indexOf(fuzzyFind, start);
    if (idx === -1) break;
    // map back to original searchArea index by counting chars (approximate)
    // simpler: we'll use a sliding window to find the actual substring
    // but for uniqueness we can check if the normalized version appears once
    fuzzyMatches.push(idx);
    start = idx + fuzzyFind.length;
  }
  if (fuzzyMatches.length === 1) {
    // We need the actual substring from searchArea
    // approximate: find the exact substring that normalizes to fuzzyFind
    // we'll use a regex to locate it with whitespace flexibility
    const regexStr = findNorm.split(/\s+/).map(escapeRegExp).join('\\s+');
    const re = new RegExp(regexStr, 'g');
    let m;
    let candidates = [];
    while ((m = re.exec(searchArea)) !== null) {
      candidates.push({ match: m[0], index: m.index });
    }
    if (candidates.length === 1) {
      return { match: candidates[0].match, index: candidates[0].index, type: 'fuzzy', area: searchArea };
    }
  }

  // 3. Expand context: take 2 lines before and 2 lines after, repeat until unique
  const findLines = findNorm.split('\n');
  const totalLines = findLines.length;
  // Try expanding by adding surrounding lines from the original master (not just searchArea?)
  // We'll operate on the original master because context may have been limited.
  // Use full master for expansion.
  const masterLines = master.split('\n');
  // We'll try to find a unique match by increasing context size
  for (let extra = 1; extra <= 5; extra++) {
    // create a pattern: lines from start-extra to end+extra
    // but we need to locate in master
    // This is heuristic; we'll build a pattern that matches the find block with optional surrounding lines.
    // We'll use a regex with line anchors and whitespace tolerance.
    // Simpler: we'll try to locate the find block in the master using a fuzzy approach
    // and then check if the surrounding lines make it unique.
    // We'll collect all occurrences of the find block (fuzzy) and then check their surrounding lines.
    let allOccurrences = [];
    const regexStr = findNorm.split(/\s+/).map(escapeRegExp).join('\\s+');
    const re = new RegExp(regexStr, 'g');
    let m;
    while ((m = re.exec(master)) !== null) {
      allOccurrences.push({ match: m[0], index: m.index });
    }
    if (allOccurrences.length === 0) break; // not found

    if (allOccurrences.length === 1) {
      return { match: allOccurrences[0].match, index: allOccurrences[0].index, type: 'fuzzy', area: master };
    }

    // For each occurrence, compute a signature of surrounding lines
    let signatures = allOccurrences.map(occ => {
      // get line number where match starts
      const before = master.substring(0, occ.index);
      const lineStart = before.split('\n').length - 1;
      const lines = master.split('\n');
      const startLine = Math.max(0, lineStart - extra);
      const endLine = Math.min(lines.length, lineStart + findLines.length + extra);
      const contextBlock = lines.slice(startLine, endLine).join('\n');
      return { occ, contextBlock, startLine };
    });

    // Check if any signature is unique
    let uniqueSig = null;
    for (let i = 0; i < signatures.length; i++) {
      let isUnique = true;
      for (let j = 0; j < signatures.length; j++) {
        if (i === j) continue;
        if (signatures[i].contextBlock === signatures[j].contextBlock) {
          isUnique = false;
          break;
        }
      }
      if (isUnique) {
        uniqueSig = signatures[i];
        break;
      }
    }
    if (uniqueSig) {
      // We found a unique surrounding context, use that occurrence
      return { match: uniqueSig.occ.match, index: uniqueSig.occ.index, type: 'expanded', area: master };
    }
  }

  // 4. Still ambiguous – return null
  return null;
}

// ----- apply patches -----
function applyPatches() {
  let master = document.getElementById('masterCode').value;
  const rawPatches = document.getElementById('patchCode').value;

  if (!master.trim() || !rawPatches.trim()) {
    showStatus('⚠️ Missing master or patches.', 'warning');
    return;
  }

  // Normalize line endings
  master = master.replace(/\r\n/g, '\n');
  const patches = parsePatches(rawPatches);

  if (patches.length === 0) {
    showStatus('⚠️ No valid patches found (need ---FIND--- and ---END---).', 'warning');
    return;
  }

  stats = { applied: 0, skipped: 0, failed: 0 };
  globalFailed = [];

  for (let idx = 0; idx < patches.length; idx++) {
    const patch = patches[idx];
    const findText = patch.findLines.join('\n').replace(/^\n+|\n+$/g, '');
    const replaceText = patch.replaceLines.join('\n').replace(/^\n+|\n+$/g, '');
    const contextText = patch.contextLines ? patch.contextLines.join('\n').replace(/^\n+|\n+$/g, '') : null;

    if (!findText) {
      stats.failed++;
      globalFailed.push({ text: '(empty find)', reason: 'Find block is empty.' });
      continue;
    }

    // ---- Idempotency check: if findText is not present, skip (already applied) ----
    if (!master.includes(findText)) {
      stats.skipped++;
      continue;
    }

    // ---- Find the best match ----
    const result = findBestMatch(master, findText, contextText);
    if (!result) {
      stats.failed++;
      globalFailed.push({
        text: findText,
        reason: 'Could not uniquely locate the block. Try adding ---CONTEXT--- with more surrounding lines.'
      });
      continue;
    }

    // ---- Apply the replacement ----
    const before = master.substring(0, result.index);
    const after = master.substring(result.index + result.match.length);
    master = before + replaceText + after;
    stats.applied++;
  }

  // Update textarea
  document.getElementById('masterCode').value = master;

  // ---- Show results ----
  const listDiv = document.getElementById('failedList');
  listDiv.innerHTML = '';

  if (stats.skipped > 0) {
    const banner = document.createElement('div');
    banner.className = 'verified-banner';
    banner.textContent = `ℹ️ ${stats.skipped} patch(es) were skipped (already applied).`;
    listDiv.appendChild(banner);
  }

  if (stats.failed > 0) {
    globalFailed.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'failed-item';
      const reason = document.createElement('div');
      reason.style.color = 'var(--warning)';
      reason.textContent = `[Patch ${i+1}] Reason: ${item.reason}`;
      const pre = document.createElement('pre');
      pre.textContent = item.text;
      div.appendChild(reason);
      div.appendChild(pre);
      listDiv.appendChild(div);
    });

    const microscope = document.getElementById('microscopeBtn');
    microscope.style.display = 'flex';
    microscope.classList.add('pulse');
    showStatus(`⚠️ Applied ${stats.applied}, Skipped ${stats.skipped}, Failed ${stats.failed}. Click 🔬`, 'warning');
  } else {
    const msg = `✅ Applied ${stats.applied} patch(es)${stats.skipped > 0 ? ' (skipped '+stats.skipped+')' : ''}.`;
    showStatus(msg, 'success');
    const microscope = document.getElementById('microscopeBtn');
    microscope.style.display = 'none';
    microscope.classList.remove('pulse');
  }
}

// ----- UI helpers -----
function toggleDebug() {
  const overlay = document.getElementById('debugOverlay');
  isDebugOpen = !isDebugOpen;
  overlay.style.display = isDebugOpen ? 'flex' : 'none';
  if (!isDebugOpen) {
    document.getElementById('microscopeBtn').classList.remove('pulse');
  }
}

function copyDebugLog() {
  let log = `Applied: ${stats.applied}\nSkipped: ${stats.skipped}\nFailed: ${stats.failed}\n\n`;
  globalFailed.forEach((f, i) => {
    log += `[Patch ${i+1}] ${f.reason}\n${f.text}\n\n`;
  });
  navigator.clipboard?.writeText(log) || alert('Copy failed. Select and copy manually.');
}

function clearPatches() { document.getElementById('patchCode').value = ''; }

function hardReset() {
  if (confirm('Clear all code and reset?')) {
    document.getElementById('masterCode').value = '';
    document.getElementById('patchCode').value = '';
    document.getElementById('fileUploader').value = '';
    stats = { applied: 0, skipped: 0, failed: 0 };
    globalFailed = [];
    currentFileName = 'patched_master.txt';
    document.getElementById('microscopeBtn').style.display = 'none';
    if (isDebugOpen) toggleDebug();
    showStatus('🚀 Reset complete.', 'error');
  }
}

function copyMaster() {
  const code = document.getElementById('masterCode').value;
  navigator.clipboard?.writeText(code) || alert('Copy failed.');
}

function downloadFile() {
  const blob = new Blob([document.getElementById('masterCode').value], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentFileName;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

// Keyboard shortcut: Escape to close debug
document.addEventListener('keydown', e => { if (e.key === 'Escape' && isDebugOpen) toggleDebug(); });
</script>
</body>
</html>
