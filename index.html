<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>vSoccer Quantum AI Engine</title>

<style>
:root{
    --bg:#050505;
    --panel:#101010;
    --border:#232323;
    --text:#f1f1f1;
    --accent:#d4af37;
    --green:#35d07f;
    --yellow:#ffd447;
    --red:#ff6363;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

.header{
    padding:18px;
    text-align:center;
    background:linear-gradient(90deg,#0c2918,#1d7f46);
}

.wrapper{max-width:560px;margin:auto;padding:12px;}

.section{
    background:var(--panel);
    border:1px solid var(--border);
    margin-bottom:12px;
    padding:15px;
}

h3{color:var(--accent);font-size:11px;text-transform:uppercase;}

input{
    width:100%;
    padding:12px;
    background:#181818;
    border:1px solid var(--border);
    color:#fff;
    font-size:15px;
    font-weight:700;
}

.btns{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-top:15px;}

button{
    padding:14px;
    font-weight:900;
    cursor:pointer;
    border:none;
}

#analyzeBtn{background:var(--accent);color:#000;}
#clearBtn{background:#333;color:#fff;}

.dashboard{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    text-align:center;
}

.metricValue{font-size:20px;font-weight:900;}

table{width:100%;border-collapse:collapse;}
td,th{padding:10px;font-size:12px;}

.green{color:var(--green);}
.yellow{color:var(--yellow);}
.red{color:var(--red);}

#results{display:none;}
</style>
</head>

<body>

<div class="header">
<h2>vSoccer Quantum AI Engine ⚽</h2>
</div>

<div class="wrapper">

<div class="section">
<h3>Inputs</h3>

<input id="homeOdds" placeholder="Home Odds">
<input id="drawOdds" placeholder="Draw Odds">
<input id="awayOdds" placeholder="Away Odds">
<input id="overOdds" placeholder="Over 2.5 Odds">
<input id="underOdds" placeholder="Under 2.5 Odds">
<input id="ggOdds" placeholder="BTTS Odds">

<div class="btns">
<button id="analyzeBtn" onclick="runAnalysis()">Run Analysis</button>
<button id="clearBtn" onclick="clearAll()">Clear</button>
</div>
</div>

<div id="results">

<div class="section">
<h3>xG Output</h3>
<div class="dashboard">
<div><div>Home</div><div id="hxg">0</div></div>
<div><div>Total</div><div id="txg">0</div></div>
<div><div>Away</div><div id="axg">0</div></div>
</div>
</div>

<div class="section">
<h3>Market Edge</h3>
<table>
<tbody id="marketBody"></tbody>
</table>
</div>

<div class="section">
<h3>Top Scores</h3>
<div id="scoreGrid"></div>
</div>

<div class="section">
<h3>Regime</h3>
<div id="regimeOutput"></div>
</div>

</div>
</div>

<script>

function safe(n){
    return typeof n === "number" && !isNaN(n) && n > 0;
}

function factorial(n){
    let r=1;
    for(let i=2;i<=n;i++) r*=i;
    return r;
}

function poisson(k, lambda){
    if(!safe(lambda)) return 0;
    return (Math.pow(lambda,k)*Math.exp(-lambda))/factorial(k);
}

function removeMargin(arr){
    const inv = arr.map(x => 1/x);
    const sum = inv.reduce((a,b)=>a+b,0);
    return inv.map(x => x/sum);
}

function solveLambda(pUnder){
    let low=0.01, high=7;

    for(let i=0;i<80;i++){
        let mid=(low+high)/2;

        let p=0;
        for(let k=0;k<=2;k++) p+=poisson(k,mid);

        if(p>pUnder) low=mid;
        else high=mid;
    }

    return (low+high)/2;
}

function dynamicRho(gg,draw,xg){
    let r =
        ((gg-50)*0.002)
        - (draw*0.08)
        + ((xg-2.5)*0.01);

    return Math.max(-0.3, Math.min(0.3, r));
}

function dixonColes(h,a,rho){
    if(h===0&&a===0) return 1-rho;
    if(h===0&&a===1) return 1+rho;
    if(h===1&&a===0) return 1+rho;
    if(h===1&&a===1) return 1-rho;
    return 1;
}

function buildMatrix(hxg,axg,rho){
    let m=[];

    let max = Math.ceil(hxg+axg+3);

    for(let h=0;h<=max;h++){
        for(let a=0;a<=max;a++){
            let p =
                poisson(h,hxg) *
                poisson(a,axg) *
                dixonColes(h,a,rho);

            m.push({h,a,score:`${h}-${a}`,prob:p});
        }
    }

    return m;
}

function entropy(matrix){
    let e=0;
    matrix.forEach(m=>{
        if(m.prob>0) e += -m.prob*Math.log2(m.prob);
    });
    return e;
}

function EV(p,o){
    return (p/100)*o - 1;
}

function probability(matrix,fn){
    let t=0;
    matrix.forEach(m=>{ if(fn(m)) t+=m.prob; });
    return t*100;
}

function runAnalysis(){

try{

    const h=parseFloat(homeOdds.value);
    const d=parseFloat(drawOdds.value);
    const a=parseFloat(awayOdds.value);
    const ov=parseFloat(overOdds.value);
    const un=parseFloat(underOdds.value);
    const gg=parseFloat(ggOdds.value);

    if([h,d,a,ov,un,gg].some(v=>!safe(v))){
        alert("Enter valid odds > 0");
        return;
    }

    const p1x2=removeMargin([h,d,a]);
    const pou=removeMargin([ov,un]);

    const pHome=p1x2[0];
    const pDraw=p1x2[1];
    const pAway=p1x2[2];

    const pUnder=pou[1];

    let txg = solveLambda(pUnder);
    txg *= (1 - pDraw*0.4);

    const total = pHome+pAway;

    let hxg = txg*(pHome/total);
    let axg = txg*(pAway/total);

    let rawGG = (1-poisson(0,hxg))*(1-poisson(0,axg));

    hxg = Math.max(0.2,hxg);
    axg = Math.max(0.2,axg);

    txg = hxg+axg;

    const rho = dynamicRho(gg*100,pDraw,txg);

    let matrix = buildMatrix(hxg,axg,rho);

    let sum = matrix.reduce((a,b)=>a+b.prob,0);
    matrix.forEach(m=>m.prob/=sum);

    document.getElementById("hxg").innerText=hxg.toFixed(2);
    document.getElementById("axg").innerText=axg.toFixed(2);
    document.getElementById("txg").innerText=txg.toFixed(2);

    const markets=[
        {
            n:"Over 2.5",
            m:probability(matrix,x=>x.h+x.a>=3),
            o:pou[0]*100,
            odds:ov
        },
        {
            n:"Under 2.5",
            m:probability(matrix,x=>x.h+x.a<=2),
            o:pou[1]*100,
            odds:un
        },
        {
            n:"Home",
            m:probability(matrix,x=>x.h>x.a),
            o:pHome*100,
            odds:h
        },
        {
            n:"Draw",
            m:probability(matrix,x=>x.h===x.a),
            o:pDraw*100,
            odds:d
        },
        {
            n:"Away",
            m:probability(matrix,x=>x.a>x.h),
            o:pAway*100,
            odds:a
        }
    ];

    document.getElementById("marketBody").innerHTML =
    markets.map(m=>
        `<tr>
        <td>${m.n}</td>
        <td>${m.m.toFixed(1)}%</td>
        <td>${m.o.toFixed(1)}%</td>
        <td>${(m.m-m.o).toFixed(1)}%</td>
        </tr>`
    ).join("");

    matrix.sort((a,b)=>b.prob-a.prob);

    document.getElementById("scoreGrid").innerHTML =
        matrix.slice(0,6).map(s=>
        `<div>${s.score} - ${(s.prob*100).toFixed(1)}%</div>`
    ).join("");

    document.getElementById("regimeOutput").innerHTML=
        `<b>Entropy:</b> ${entropy(matrix).toFixed(2)}<br>
         <b>Rho:</b> ${rho.toFixed(3)}`;

    results.style.display="block";

}catch(e){
    console.error(e);
    alert("Engine crashed. Check console.");
}

}

function clearAll(){
    document.querySelectorAll("input").forEach(i=>i.value="");
    results.style.display="none";
}

</script>

</body>
</html>
