<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vSoccer Quantum Engine 10.0</title>

<style>
body{margin:0;background:#050505;color:#fff;font-family:Arial}
.wrapper{max-width:600px;margin:auto;padding:12px}
.section{background:#111;padding:15px;margin-bottom:12px;border:1px solid #222}
input{width:100%;padding:10px;margin:5px 0;background:#1a1a1a;color:#fff;border:1px solid #333}
button{padding:12px;width:100%;margin-top:10px;background:#d4af37;border:none;font-weight:900}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #222;font-size:12px}
h3{color:#d4af37}
.small{font-size:12px;color:#aaa}
</style>
</head>

<body>

<div class="wrapper">

<div class="section">
<h3>Market Input</h3>

<input id="homeOdds" placeholder="Home Odds">
<input id="drawOdds" placeholder="Draw Odds">
<input id="awayOdds" placeholder="Away Odds">
<input id="overOdds" placeholder="Over 2.5">
<input id="underOdds" placeholder="Under 2.5">
<input id="ggOdds" placeholder="BTTS Odds">

<button onclick="run()">RUN QUANTUM SIMULATION</button>
</div>

<div class="section" id="out" style="display:none">

<h3>RESULTS</h3>

<div class="small" id="xg"></div>

<h3>TOP SCORELINES (SIMULATED)</h3>
<div id="scores"></div>

<h3>MATCH FLOW (0–90 MIN SIMULATION)</h3>
<div class="small" id="flow"></div>

<h3>MARKET EDGE</h3>
<table id="table"></table>

</div>

</div>

<script>

function poisson(k, l){
    return (Math.pow(l,k)*Math.exp(-l)) / factorial(k);
}

function factorial(n){
    let r=1;
    for(let i=2;i<=n;i++) r*=i;
    return r;
}

function removeMargin(arr){
    let s=arr.reduce((a,b)=>a+(1/b),0);
    return arr.map(v=>(1/v)/s);
}

function solveLambda(pUnder){
    let low=0.5, high=6;
    for(let i=0;i<60;i++){
        let mid=(low+high)/2;
        let p=poisson(0,mid)+poisson(1,mid)+poisson(2,mid);
        if(p>pUnder) low=mid;
        else high=mid;
    }
    return (low+high)/2;
}

// VARIANCE FIX
function variance(txg, gg, draw){
    return Math.max(0.85, Math.min(1.25,
        1 + (gg-50)*0.004 - draw*0.25 + (txg-2.5)*0.05
    ));
}

// BTTS FIX
function btts(h,a,rho){
    let base=(1-Math.exp(-h))*(1-Math.exp(-a));
    return Math.min(1, Math.max(0, base*(1+rho*1.7)));
}

// DYNAMIC RHO
function rho(gg, draw, xg){
    return ((gg-50)*0.0025) - (draw*0.08) + (xg-2.3)*0.02;
}

// SCORE SIMULATION (MONTE CARLO REAL USE)
function simulate(hxg, axg){
    let res=[];
    for(let i=0;i<8000;i++){
        let h=0,a=0;
        for(let k=0;k<6;k++){
            if(Math.random()<poisson(k,hxg)) h=k;
            if(Math.random()<poisson(k,axg)) a=k;
        }
        res.push([h,a]);
    }
    return res;
}

// TIME DEPENDENT SIMULATION (KEY UPGRADE)
function timeSim(hxg, axg){
    let log=[];
    let home=0, away=0;

    for(let min=1;min<=90;min++){

        let intensity = 1;

        // game opens up after 60 min
        if(min>60) intensity=1.35;
        if(min>75) intensity=1.6;

        let hRate=(hxg/90)*intensity;
        let aRate=(axg/90)*intensity;

        if(Math.random()<hRate){
            home++;
            hxg*=1.02; // momentum boost
        }

        if(Math.random()<aRate){
            away++;
            axg*=1.02;
        }

        if(min%15===0){
            log.push(`${min}' → ${home}-${away}`);
        }
    }

    return log;
}

function run(){

let h=parseFloat(homeOdds.value);
let d=parseFloat(drawOdds.value);
let a=parseFloat(awayOdds.value);
let ov=parseFloat(overOdds.value);
let un=parseFloat(underOdds.value);
let gg=parseFloat(ggOdds.value);

let p1x2=removeMargin([h,d,a]);
let pou=removeMargin([ov,un]);

let ph=p1x2[0], pd=p1x2[1], pa=p1x2[2];
let pUnder=pou[1];
let pGG=(1/gg)/((1/gg)+(1/2));

let txg=solveLambda(pUnder);

txg*=1-(pd*0.5);

let hxg=txg*(ph/(ph+pa));
let axg=txg*(pa/(ph+pa));

let varBoost=variance(txg,pGG*100,pd);

hxg*=varBoost;
axg*=varBoost;

let r=rho(pGG*100,pd,txg);

let ggReal=btts(hxg,axg,r);

hxg+=ggReal*0.2;
axg+=ggReal*0.2;

txg=hxg+axg;

let sim=simulate(hxg,axg);

let scoreMap={};

sim.forEach(s=>{
let key=s[0]+"-"+s[1];
scoreMap[key]=(scoreMap[key]||0)+1;
});

let sorted=Object.entries(scoreMap)
.sort((a,b)=>b[1]-a[1])
.slice(0,6);

let flow=timeSim(hxg,axg);

xg.innerHTML=
`Home xG: ${hxg.toFixed(2)} | Away xG: ${axg.toFixed(2)} | Total: ${txg.toFixed(2)}`;

scores.innerHTML=sorted.map(s=>
`<div>${s[0]} → ${(s[1]/80).toFixed(1)}%</div>`
).join("");

flowDiv="";

flow.forEach(f=>{
flowDiv+=f+"<br>";
});

flow.innerHTML=flowDiv;

table.innerHTML=`
<tr><th>Market</th><th>Model</th><th>Signal</th></tr>
<tr><td>BTTS</td><td>${(ggReal*100).toFixed(1)}%</td><td>CALIBRATED</td></tr>
<tr><td>Over 2.5</td><td>${(txg>2.5?65:40).toFixed(1)}%</td><td>ADJUSTED</td></tr>
<tr><td>Under 2.5</td><td>${(txg<2.5?60:35).toFixed(1)}%</td><td>ADJUSTED</td></tr>
`;

out.style.display="block";

}

</script>

</body>
</html>
