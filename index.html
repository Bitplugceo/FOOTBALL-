<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>vSoccer Quantum AI Engine</title>

<style>

:root{
    --bg:#050505;
    --panel:#101010;
    --border:#232323;
    --text:#f1f1f1;
    --accent:#d4af37;
    --green:#35d07f;
    --yellow:#ffd447;
    --red:#ff6363;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

.header{
    padding:18px;
    text-align:center;
    background:linear-gradient(90deg,#0c2918,#1d7f46);
}

.header h1{
    margin:0;
    font-size:17px;
    text-transform:uppercase;
    font-weight:900;
}

.wrapper{max-width:560px;margin:auto;padding:12px;}

.section{
    background:var(--panel);
    border:1px solid var(--border);
    margin-bottom:12px;
    padding:15px;
}

.section h3{
    margin:0 0 14px 0;
    color:var(--accent);
    font-size:11px;
    text-transform:uppercase;
    border-bottom:1px solid var(--border);
    padding-bottom:6px;
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.group{display:flex;flex-direction:column;}

label{font-size:9px;color:#888;margin-bottom:5px;font-weight:800;}

input{
    background:#181818;
    border:1px solid var(--border);
    color:#fff;
    padding:13px 10px;
    font-size:16px;
    font-weight:700;
}

.btns{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-top:15px;}

button{
    border:none;
    padding:15px;
    font-weight:900;
    text-transform:uppercase;
    cursor:pointer;
}

#analyzeBtn{background:var(--accent);color:#000;}
#clearBtn{background:#333;color:#fff;}

table{width:100%;border-collapse:collapse;}

th{
    background:#171717;
    padding:10px 8px;
    font-size:9px;
    color:var(--accent);
}

td{
    padding:13px 8px;
    border-bottom:1px solid var(--border);
    font-size:12px;
    font-weight:700;
}

.center{text-align:center;}
.right{text-align:right;}

.green{color:var(--green);}
.yellow{color:var(--yellow);}
.red{color:var(--red);}

#results{display:none;}

.scoreGrid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.scoreCard{
    background:#0b0b0b;
    border:1px solid #1d1d1d;
    padding:12px;
    text-align:center;
}

.score{color:var(--accent);font-size:18px;font-weight:900;}

.scoreProb{margin-top:5px;font-size:11px;color:#aaa;}

.bestPick{
    background:#0f1a12;
    border:1px solid var(--green);
    padding:12px;
    margin-bottom:10px;
    text-align:center;
}

.bestPick h4{
    margin:0;
    color:var(--green);
    font-size:11px;
    text-transform:uppercase;
}

</style>
</head>

<body>

<div class="header">
    <h1>vSoccer Quantum AI Engine ⚽</h1>
</div>

<div class="wrapper">

<div class="section">

<h3>Market Input</h3>

<div class="grid">

<div class="group"><label>HOME</label><input id="homeOdds" type="number" step="0.01"></div>
<div class="group"><label>DRAW</label><input id="drawOdds" type="number" step="0.01"></div>
<div class="group"><label>AWAY</label><input id="awayOdds" type="number" step="0.01"></div>
<div class="group"><label>OVER 2.5</label><input id="overOdds" type="number" step="0.01"></div>
<div class="group"><label>UNDER 2.5</label><input id="underOdds" type="number" step="0.01"></div>
<div class="group"><label>GG</label><input id="ggOdds" type="number" step="0.01"></div>

</div>

<div class="btns">
<button id="analyzeBtn" onclick="runAnalysis()">Run Analysis</button>
<button id="clearBtn" onclick="clearAll()">Clear</button>
</div>

</div>

<div id="results">

<div class="section">

<h3>Expected Goals</h3>

<div style="display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;">
<div><div>HOME xG</div><b id="hxg">0</b></div>
<div><div>TOTAL xG</div><b id="txg">0</b></div>
<div><div>AWAY xG</div><b id="axg">0</b></div>
</div>

</div>

<div class="section">

<h3>Strongest Pick (Auto Ranked)</h3>
<div id="bestPick" class="bestPick"></div>

<h3>Market Edge Matrix</h3>

<table>
<thead>
<tr>
<th>Market</th>
<th class="center">Model</th>
<th class="center">Market</th>
<th class="right">Edge</th>
</tr>
</thead>
<tbody id="marketBody"></tbody>
</table>

</div>

<div class="section">

<h3>Most Likely Scores</h3>
<div id="scoreGrid" class="scoreGrid"></div>

</div>

</div>
</div>

<script>

function poisson(k,lambda){
    return (Math.pow(lambda,k)*Math.exp(-lambda))/factorial(k);
}

function factorial(n){
    let r=1;
    for(let i=2;i<=n;i++) r*=i;
    return r;
}

function removeMargin(arr){
    let total=0;
    arr.forEach(v=>total+=(1/v));
    return arr.map(v=>(1/v)/total);
}

function solveLambda(pUnder){
    let low=0.01,high=7;
    for(let i=0;i<80;i++){
        let mid=(low+high)/2;
        let p=poisson(0,mid)+poisson(1,mid)+poisson(2,mid);
        if(p>pUnder) low=mid; else high=mid;
    }
    return (low+high)/2;
}

function buildMatrix(hxg,axg){
    let m=[];
    for(let h=0;h<=6;h++){
        for(let a=0;a<=6;a++){
            m.push({
                score:`${h}-${a}`,
                prob:poisson(h,hxg)*poisson(a,axg),
                home:h,
                away:a
            });
        }
    }
    return m;
}

function EV(prob,odds){
    return ((prob/100)*odds)-1;
}

function runAnalysis(){

const h=+homeOdds.value;
const d=+drawOdds.value;
const a=+awayOdds.value;
const ov=+overOdds.value;
const un=+underOdds.value;
const gg=+ggOdds.value;

if([h,d,a,ov,un,gg].some(isNaN)){
    alert("Fill all odds");
    return;
}

const p1x2=removeMargin([h,d,a]);
const pou=removeMargin([ov,un]);

const pHome=p1x2[0];
const pDraw=p1x2[1];
const pAway=p1x2[2];

const pOver=pou[0];
const pUnder=pou[1];

let txg=solveLambda(pUnder);

let hxg=txg*(pHome/(pHome+pAway));
let axg=txg*(pAway/(pHome+pAway));

txg=hxg+axg;

hxg=Math.max(0.2,hxg);
axg=Math.max(0.2,axg);

const matrix=buildMatrix(hxg,axg);

let total=matrix.reduce((s,m)=>s+m.prob,0);
matrix.forEach(m=>m.prob/=total);

const markets=[
{
name:"Home Win",
model:matrix.filter(m=>m.home>m.away).reduce((a,b)=>a+b.prob,0)*100,
market:pHome*100,
odds:h
},
{
name:"Draw",
model:matrix.filter(m=>m.home===m.away).reduce((a,b)=>a+b.prob,0)*100,
market:pDraw*100,
odds:d
},
{
name:"Away Win",
model:matrix.filter(m=>m.away>m.home).reduce((a,b)=>a+b.prob,0)*100,
market:pAway*100,
odds:a
},
{
name:"Over 2.5",
model:matrix.filter(m=>(m.home+m.away)>=3).reduce((a,b)=>a+b.prob,0)*100,
market:pOver*100,
odds:ov
},
{
name:"Under 2.5",
model:matrix.filter(m=>(m.home+m.away)<=2).reduce((a,b)=>a+b.prob,0)*100,
market:pUnder*100,
odds:un
}
];

// SORT BY STRONGEST EDGE (EV priority)
markets.sort((x,y)=>EV(y.model,y.odds)-EV(x.model,x.odds));

const best=markets[0];

bestPick.innerHTML=`
<h4>${best.name}</h4>
<div style="font-size:22px;color:#35d07f;font-weight:900;">
${EV(best.model,best.odds).toFixed(2)} EV
</div>
`;

marketBody.innerHTML="";

markets.forEach(m=>{
let edge=m.model-m.market;

marketBody.innerHTML+=`
<tr>
<td>${m.name}</td>
<td class="center">${m.model.toFixed(1)}%</td>
<td class="center">${m.market.toFixed(1)}%</td>
<td class="right ${edge>0?'green':'red'}">${edge.toFixed(1)}%</td>
</tr>`;
});

matrix.sort((a,b)=>b.prob-a.prob);

scoreGrid.innerHTML="";

matrix.slice(0,6).forEach(s=>{
scoreGrid.innerHTML+=`
<div class="scoreCard">
<div class="score">${s.score}</div>
<div class="scoreProb">${(s.prob*100).toFixed(1)}%</div>
</div>`;
});

hxgEl.innerText=hxg.toFixed(2);
axgEl.innerText=axg.toFixed(2);
txgEl.innerText=txg.toFixed(2);

results.style.display="block";

}

function clearAll(){
document.querySelectorAll("input").forEach(i=>i.value="");
results.style.display="none";
}

</script>

</body>
</html>
